# 本地/生产 Postgres + pgvector（无 Supabase）
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: safebase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: safebase
    # 宿主机 5433，避免 Mac 本机 Postgres 占用 5432；生产无冲突时可改为 "5432:5432"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d safebase"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
